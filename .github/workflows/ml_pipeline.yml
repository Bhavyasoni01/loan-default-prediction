name: ML-Pipeline 

on: 
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    ml-pipeline:
        runs-on: ubuntu-latest

        steps:
        - name: Check Code
          uses: actions/checkout@v4

        - name: Setup Python
          uses: actions/setup-python@v5
          with:
                python-version: '3.11'

        - name: Install Dependencies
          run: |
            python -m pip install --upgrade pip
            pip install -r requirements.txt

        - name: Validate Dataset
          run: |
           python -c "
            import pandas as pd
             df = pd.read_csv('sample_dataset.csv')
             assert len(df) > 0, 'DataSet is Empty'
             assert 'target' in df.columns, 'Target column missing'
             assert df['target'].nunique()==2,'Expected Binary Classification'
             print(f'Dataset is valid: {len(df)} rows, {df.columns.tolist()}')
             "
        - name: Train and validate model
          run: | 
           python validate_model.py
        
        - name: Build Docker Image
          run: |
           docker build -f dockerfile.api -t loandefault-api .

        - name: Test Docker Container
          run: |
           docker run -d -p 8080:8080 --name test-container loandefault-api
           sleep 10
           curl -f http://localhost:8080/ || ( docker logs test-container &&  exit 1)
           docker stop test-container 
           echo "Docker Container has Passed the test"

